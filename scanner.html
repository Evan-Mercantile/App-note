
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#07080f;--surface:#10111c;--card:#161724;--border:rgba(255,255,255,0.07);--accent:#d4f53c;--red:#ff4d6d;--blue:#4d9fff;--text:#e4e4f0;--muted:#50516e;}
body{background:transparent;}
#app{font-family:'DM Mono',monospace;color:var(--text);padding:20px 4px 40px;max-width:640px;margin:0 auto;}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:800;letter-spacing:-2px;margin-bottom:6px;}
h1 em{font-style:normal;color:var(--accent);}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:20px;font-size:10px;letter-spacing:.1em;}
.badge-green{background:rgba(212,245,60,0.1);border:1px solid rgba(212,245,60,0.25);color:var(--accent);}
.badge-blue{background:rgba(77,159,255,0.1);border:1px solid rgba(77,159,255,0.25);color:var(--blue);}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.step-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;}
.trim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.trim-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.trim-btn.active{background:rgba(212,245,60,0.1);border-color:rgba(212,245,60,0.4);color:var(--accent);}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;background:var(--surface);transition:all .2s;position:relative;}
.drop-zone:hover,.drop-zone.over{border-color:rgba(212,245,60,0.4);background:rgba(212,245,60,0.03);}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:30px;margin-bottom:8px;}
.drop-text{font-size:12px;color:var(--muted);}
.preview{width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin-top:12px;border:1px solid var(--border);}
.scan-btn{width:100%;background:var(--accent);color:#07080f;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;transition:all .2s;}
.scan-btn:disabled{background:#1a1b2a;color:var(--muted);cursor:not-allowed;}
.progress{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;display:none;}
.log-line{font-size:11px;line-height:2;display:block;}
.log-ok{color:var(--accent);}
.log-err{color:var(--red);}
.log-info{color:var(--blue);}
.results{background:var(--surface);border:1px solid rgba(212,245,60,0.2);border-radius:12px;padding:16px;margin-top:10px;display:none;}
.results-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--accent);margin-bottom:10px;}
.mat-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:7px 10px;border-radius:8px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;}
.mat-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;min-width:130px;flex:1;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;background:var(--bg);}
.chip-pos{color:var(--accent);border-color:rgba(212,245,60,0.25);}
.chip-neg{color:var(--red);border-color:rgba(255,77,109,0.25);}
.confirm-btn{width:100%;background:var(--accent);color:#07080f;border:none;border-radius:10px;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:12px;}
.reset-btn{width:100%;background:none;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;margin-top:6px;}
.success{text-align:center;padding:32px 16px;display:none;}
.suc-icon{font-size:52px;margin-bottom:12px;}
.suc-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
.suc-sub{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<div id="app">
  <h1>Scanner <em>bulletin</em></h1>
  <div class="badges">
    <span class="badge badge-green">✨ Sans clef API</span>
    <span class="badge badge-blue">🤖 Claude AI</span>
  </div>

  <div id="mainForm">
    <div class="card">
      <div class="step-label">Étape 1</div>
      <div class="section-title">Quel trimestre ?</div>
      <div class="trim-grid">
        <button class="trim-btn" onclick="selectTrim('t1',this)">T1</button>
        <button class="trim-btn" onclick="selectTrim('t2',this)">T2</button>
        <button class="trim-btn" onclick="selectTrim('t3',this)">T3</button>
      </div>
    </div>

    <div class="card">
      <div class="step-label">Étape 2</div>
      <div class="section-title">Photo du bulletin</div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📄</div>
        <div class="drop-text" id="dropText">Clique ou dépose une photo — JPG, PNG</div>
        <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this.files[0])">
      </div>
      <img id="preview" class="preview" style="display:none" alt="">

      <button class="scan-btn" id="scanBtn" disabled onclick="startScan()">
        🔍 Analyser et extraire les notes
      </button>

      <div class="progress" id="progressBox">
        <div id="logEl"></div>
      </div>

      <div class="results" id="resultsBox">
        <div class="results-title" id="resultsTitle"></div>
        <div id="resultsList"></div>
        <button class="confirm-btn" onclick="showSuccess()">✅ Confirmer les notes</button>
        <button class="reset-btn" onclick="resetScan()">↩ Nouveau scan</button>
      </div>
    </div>
  </div>

  <div class="success" id="successBox">
    <div class="suc-icon">🎉</div>
    <div class="suc-title">Notes extraites !</div>
    <div class="suc-sub" id="successSub"></div>
    <div id="successList" style="text-align:left;margin-bottom:16px;"></div>
    <button class="reset-btn" style="max-width:300px;margin:0 auto" onclick="resetAll()">📷 Scanner un autre bulletin</button>
  </div>
</div>

<script>
const MATIERES = [
  {id:"fr",label:"📖 Français"},{id:"ma",label:"🧮 Maths"},{id:"hg",label:"🌍 Histoire-Géo"},
  {id:"en",label:"🇬🇧 Anglais"},{id:"zh",label:"🇨🇳 Chinois"},{id:"svt",label:"🌱 SVT"},
  {id:"pc",label:"⚗️ Physique-Chimie"},{id:"tech",label:"💻 Technologie"},
  {id:"mu",label:"🎵 Musique"},{id:"eps",label:"⚽ EPS"},
  {id:"ap",label:"🎨 Arts Plastiques"},{id:"vs",label:"🏫 Vie Scolaire"},
];
const TRIM_LABELS = {t1:"1er trimestre",t2:"2e trimestre",t3:"3e trimestre"};

let selectedTrim = null, imageBase64 = null, imageMime = null, extractedNotes = {};

function selectTrim(t, btn) {
  selectedTrim = t;
  document.querySelectorAll('.trim-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateBtn();
}

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  imageMime = file.type || 'image/jpeg';
  document.getElementById('dropText').textContent = file.name;
  const prev = document.getElementById('preview');
  prev.src = URL.createObjectURL(file);
  prev.style.display = '';
  const reader = new FileReader();
  reader.onload = e => { imageBase64 = e.target.result.split(',')[1]; updateBtn(); };
  reader.readAsDataURL(file);
}

function updateBtn() {
  document.getElementById('scanBtn').disabled = !(selectedTrim && imageBase64);
}

function addLog(type, msg) {
  const s = document.createElement('span');
  s.className = 'log-line log-' + type;
  s.textContent = msg;
  document.getElementById('logEl').appendChild(s);
}

async function startScan() {
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('resultsBox').style.display = 'none';
  document.getElementById('progressBox').style.display = 'block';
  document.getElementById('logEl').innerHTML = '';

  addLog('info', '📷 Image chargée…');
  addLog('info', '🤖 Envoi à Claude AI…');

  const prompt = `Tu es un assistant qui lit des bulletins scolaires français.
Analyse cette image et extrait toutes les notes numériques pour chaque matière.
Matières : fr=Français, ma=Maths, hg=Histoire-Géo, en=Anglais, zh=Chinois, svt=SVT, pc=Physique-Chimie, tech=Technologie, mu=Musique, eps=EPS, ap=Arts Plastiques, vs=Vie Scolaire
Réponds UNIQUEMENT en JSON valide sans texte ni backticks :
{"notes":{"fr":[14.5,16],"ma":[18],...}}
N'inclus que les matières visibles, n'invente aucune note, nombres entre 0 et 20.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await res.json();
    if (!res.ok) {
      addLog('err', '❌ ' + (data.error?.message || 'Erreur '+res.status));
      document.getElementById('scanBtn').disabled = false;
      return;
    }

    const text = data.content?.[0]?.text || '';
    addLog('ok', '✅ Réponse reçue !');

    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch { addLog('err', '❌ Réponse illisible — image plus nette ?'); document.getElementById('scanBtn').disabled = false; return; }

    extractedNotes = parsed.notes || {};

    // Trier chaque tableau de notes en ordre croissant
    for (const id in extractedNotes) {
      extractedNotes[id] = extractedNotes[id].slice().sort((a, b) => a - b);
    }

    const total = Object.values(extractedNotes).reduce((a,n)=>a+n.length,0);
    addLog('ok', `✅ ${total} note(s) dans ${Object.keys(extractedNotes).length} matière(s) — triées ↑`);
    renderResults();

  } catch(e) {
    addLog('err', '❌ Erreur : ' + e.message);
    document.getElementById('scanBtn').disabled = false;
  }
}

function makeRows(notes) {
  return MATIERES.map(m => {
    const ns = notes[m.id];
    if (!ns?.length) return null;
    const chips = ns.map(n => `<span class="chip ${n>=10?'chip-pos':'chip-neg'}">${n}/20</span>`).join('');
    return `<div class="mat-row"><span class="mat-name">${m.label}</span><span class="chips">${chips}</span></div>`;
  }).filter(Boolean).join('');
}

function renderResults() {
  document.getElementById('resultsTitle').textContent = `✅ Notes — ${TRIM_LABELS[selectedTrim]}`;
  const rows = makeRows(extractedNotes);
  document.getElementById('resultsList').innerHTML = rows || '<div style="color:var(--muted);font-size:12px;padding:10px;text-align:center">Aucune note reconnue</div>';
  document.getElementById('resultsBox').style.display = '';
}

function showSuccess() {
  const total = Object.values(extractedNotes).reduce((a,n)=>a+n.length,0);
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successSub').innerHTML = `<strong style="color:var(--accent)">${total} notes</strong> extraites pour le <strong>${TRIM_LABELS[selectedTrim]}</strong> — triées par ordre croissant.`;
  document.getElementById('successList').innerHTML = makeRows(extractedNotes);
  document.getElementById('successBox').style.display = '';
}

function resetScan() {
  extractedNotes = {}; imageBase64 = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('progressBox').style.display = 'none';
  document.getElementById('resultsBox').style.display = 'none';
  document.getElementById('dropText').textContent = 'Clique ou dépose une photo — JPG, PNG';
  document.getElementById('fileInput').value = '';
  updateBtn();
}

function resetAll() {
  selectedTrim = null; resetScan();
  document.querySelectorAll('.trim-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('successBox').style.display = 'none';
  document.getElementById('mainForm').style.display = '';
}
</script>
